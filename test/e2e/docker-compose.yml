services:
  lyskom-server:
    build:
      context: .
      dockerfile: Dockerfile.lyskom-server
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4894"]
      interval: 2s
      timeout: 2s
      retries: 10

  seed:
    build:
      context: .
      dockerfile: Dockerfile.seed
    depends_on:
      lyskom-server:
        condition: service_healthy

  httpkom:
    build:
      context: .
      dockerfile: Dockerfile.httpkom
    ports:
      - "5001:5001"
    depends_on:
      seed:
        condition: service_completed_successfully
